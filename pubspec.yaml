name: telemed_app
description: Aplicativo para controle de caixa de remédios.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.7.0
  flutter_secure_storage: ^10.3.1
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/remindcare_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/remindcare_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/remindcare_logo.png"
  remove_alpha_ios: true